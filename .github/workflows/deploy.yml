name: Deploy EduBot

on:
  push:
    branches: [main]

jobs:
  # Runs first. Both deploy jobs depend on this so failing tests block
  # production deploys.
  test:
    name: Tests (worker + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm install

      - name: Run Worker tests
        working-directory: worker
        run: npm test

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run Frontend tests
        working-directory: frontend
        # No frontend tests yet; this still succeeds ("No test files found"
        # is treated as success when --passWithNoTests). Kept so the job
        # stays in the CI chain and picks up tests as we add them.
        run: npm test -- --passWithNoTests

  deploy-worker:
    name: Deploy Worker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker
        working-directory: worker
        # `--env=""` targets the top-level production config. Required because
        # wrangler.toml defines an `[env.staging]` block; wrangler v4 in a
        # non-interactive CI run refuses to pick an env for you and exits
        # non-zero instead of defaulting to the top-level one like v3 did.
        run: npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: npx wrangler pages deploy dist --project-name edubot-webapp --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
