name: EduBot Bug Hunt

on:
  workflow_dispatch:
  schedule:
    # Daily 03:15 WIB, after the student activity day has quieted down.
    - cron: '15 20 * * *'

permissions:
  contents: read

jobs:
  bug-hunt:
    name: Sequential bug-hunt pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run sequential bug hunt
        run: npm run bug-hunt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUG_HUNT_AI: '1'

      - name: Append report to job summary
        if: always()
        run: |
          if [ -f artifacts/bug-hunt-report.md ]; then
            cat artifacts/bug-hunt-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No bug-hunt report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload bug-hunt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-hunt-artifacts
          path: |
            artifacts/bug-hunt-report.md
            artifacts/bug-hunt-report.html
            artifacts/bug-hunt-summary.json
            artifacts/bug-hunt-ledger.jsonl
          if-no-files-found: warn
